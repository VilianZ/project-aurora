; ============================================================
; AURORA IoT FIRMWARE — ESP32-S3-DevKitC-1 (N16R8)
; Hardware: 16MB Flash (Quad SPI) + 8MB PSRAM (Octal/OPI)
; Camera:   OV3660 (Freenove ESP32-S3-WROOM standard pinout)
; Sensor:   HC-SR04 on GPIO 1 (Trig) + GPIO 2 (Echo)
;
; NOTE: ARDUINO_USB_CDC_ON_BOOT is NOT set here.
;       USB CDC interrupts break pulseIn() for the HC-SR04.
;       Serial output goes through UART port (CP2102).
; ============================================================

[platformio]
default_envs = esp32-s3-uart

[env]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Flash/PSRAM config for N16R8: 16MB QIO Flash + 8MB Octal PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

lib_deps =
    https://github.com/espressif/esp32-camera.git#v2.1.6
    heman/AsyncMqttClient-esphome @ ^2.0.0
    bblanchon/ArduinoJson @ ^7.0.3
    links2004/WebSockets @ ^2.4.0

monitor_filters = esp32_exception_decoder

; ============================================================
; ENV 1 — UART port (CP2102 chip, most common)
; ============================================================
[env:esp32-s3-uart]
upload_protocol = esptool
upload_speed    = 921600
upload_flags    =
    --before=default_reset
    --after=hard_reset
    --chip=esp32s3

; Uncomment if PlatformIO picks the wrong port:
; upload_port  = COM8
; monitor_port = COM12

; ============================================================
; ENV 2 — USB/OTG port (built-in JTAG, needs Zadig/WinUSB)
;          Only this env enables USB CDC for serial over USB-C
; ============================================================
[env:esp32-s3-jtag]
upload_protocol = esp-builtin
debug_tool      = esp-builtin
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
; monitor_port = COM10  
